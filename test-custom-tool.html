<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom Tool Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #0a0a0a; color: #e0e0e0; }
    button { padding: 10px 20px; background: #f5c518; color: #000; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #output { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Custom Tool Test</h1>
  <button onclick="testCustomTool()">Test Weather Tool</button>
  <div id="output"></div>

  <script type="module">
    import { agenticAsk } from './agentic-agent.js'

    window.testCustomTool = async function() {
      const output = document.getElementById('output')
      output.textContent = 'Testing custom tool...\n'

      try {
        const result = await agenticAsk('What is the weather in Beijing?', {
          provider: 'anthropic',
          apiKey: 'sk-ghmxEJX3PJ0hWZpy0COZUbEk2f6aTiyUu4zrbz0ZhRoQvgV2',
          baseUrl: 'https://www.subrouter.ai',
          model: 'claude-opus-4-6',
          stream: false,
          tools: [
            {
              name: 'get_weather',
              description: 'Get current weather for a location',
              parameters: {
                type: 'object',
                properties: {
                  location: { type: 'string', description: 'City name' }
                },
                required: ['location']
              },
              execute: async ({ location }) => {
                output.textContent += `[Tool called: get_weather(${location})]\n`
                return {
                  location,
                  temperature: '15°C',
                  condition: 'Sunny',
                  humidity: '45%'
                }
              }
            }
          ]
        }, (event, data) => {
          if (event === 'status') {
            output.textContent += `[${data.message}]\n`
          } else if (event === 'tool') {
            output.textContent += `[Tool: ${data.name}]\n`
          }
        })

        output.textContent += '\n=== Result ===\n' + result.answer
      } catch (err) {
        output.textContent += '\nError: ' + err.message
        console.error(err)
      }
    }
  </script>
</body>
</html>
