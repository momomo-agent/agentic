<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .subtitle {
      color: #888;
      font-size: 16px;
      margin-bottom: 48px;
    }
    
    .mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    
    .mic-button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
    
    .mic-button:active {
      transform: scale(0.95);
    }
    
    .mic-button.recording {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
    }
    
    .status {
      font-size: 18px;
      color: #888;
      margin-bottom: 24px;
      min-height: 28px;
    }
    
    .transcript {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      min-height: 80px;
      text-align: left;
    }
    
    .transcript-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .transcript-text {
      font-size: 16px;
      line-height: 1.6;
    }
    
    .response {
      background: #374151;
      padding: 20px;
      border-radius: 8px;
      min-height: 120px;
      text-align: left;
    }
    
    .response-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .response-text {
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 Voice Assistant</h1>
    <p class="subtitle">按住说话，松开发送</p>
    
    <button class="mic-button" id="micBtn">🎤</button>
    
    <div class="status" id="status">准备就绪</div>
    
    <div class="transcript">
      <div class="transcript-label">你说的话</div>
      <div class="transcript-text" id="transcript">等待输入...</div>
    </div>
    
    <div class="response">
      <div class="response-label">AI 回复</div>
      <div class="response-text" id="response">等待回复...</div>
    </div>
  </div>
  
  <script src="../../packages/voice/agentic-voice.js"></script>
  <script src="./voice-assistant.js"></script>
</body>
</html>
