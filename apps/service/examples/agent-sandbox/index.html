<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    .header {
      padding: 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .header p {
      color: #888;
      font-size: 14px;
    }
    
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .sidebar {
      width: 280px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      padding: 20px;
      overflow-y: auto;
    }
    
    .sidebar h2 {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    
    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .tool-item {
      padding: 12px;
      background: #0a0a0a;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tool-item:hover {
      background: rgba(59, 130, 246, 0.1);
    }
    
    .tool-item.enabled {
      border-left: 3px solid #4ade80;
    }
    
    .tool-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .tool-desc {
      color: #888;
      font-size: 12px;
    }
    
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      padding: 16px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.6;
    }
    
    .message.user {
      background: #3b82f6;
      align-self: flex-end;
    }
    
    .message.assistant {
      background: #374151;
      align-self: flex-start;
    }
    
    .message.tool {
      background: #1f2937;
      align-self: flex-start;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      max-width: 90%;
    }
    
    .tool-call {
      color: #4ade80;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .tool-result {
      color: #9ca3af;
      white-space: pre-wrap;
    }
    
    .input-area {
      padding: 20px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      gap: 12px;
    }
    
    .input-area textarea {
      flex: 1;
      padding: 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 60px;
    }
    
    .input-area textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Agent Sandbox</h1>
    <p>带工具调用的 AI Agent 沙盒</p>
  </div>
  
  <div class="main">
    <div class="sidebar">
      <h2>可用工具</h2>
      <div class="tool-list" id="toolList"></div>
    </div>
    
    <div class="chat-area">
      <div class="messages" id="messages"></div>
      
      <div class="input-area">
        <textarea id="input" placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"></textarea>
        <button class="btn btn-primary" id="sendBtn">发送</button>
      </div>
    </div>
  </div>
  
  <script src="./agent-sandbox.js"></script>
</body>
</html>
