<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcription Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    .header {
      padding: 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .header p {
      color: #888;
      font-size: 14px;
    }
    
    .main {
      flex: 1;
      display: flex;
      gap: 20px;
      padding: 20px;
      overflow: hidden;
    }
    
    .upload-panel {
      width: 300px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .upload-area {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .upload-area:hover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
    }
    
    .upload-area.dragover {
      border-color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    
    .file-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .file-item {
      padding: 12px;
      background: #0a0a0a;
      border-radius: 6px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .file-item.processing {
      border-left: 3px solid #3b82f6;
    }
    
    .file-item.done {
      border-left: 3px solid #4ade80;
    }
    
    .file-item.error {
      border-left: 3px solid #ef4444;
    }
    
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
    }
    
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    .result-panel {
      flex: 1;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .result-header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .result-content {
      flex: 1;
      overflow-y: auto;
      background: #0a0a0a;
      border-radius: 6px;
      padding: 16px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    
    .empty-state {
      color: #666;
      text-align: center;
      padding: 60px 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📝 Transcription Studio</h1>
    <p>批量音频转写工作台</p>
  </div>
  
  <div class="main">
    <div class="upload-panel">
      <div class="upload-area" id="uploadArea">
        <div style="font-size: 48px; margin-bottom: 12px;">📁</div>
        <div style="font-size: 14px; color: #888;">点击或拖拽上传音频</div>
        <div style="font-size: 12px; color: #666; margin-top: 8px;">支持 MP3, WAV, M4A, OGG</div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" multiple style="display: none;">
      
      <button class="btn btn-primary" id="transcribeBtn" disabled>开始转写</button>
      
      <div class="file-list" id="fileList"></div>
    </div>
    
    <div class="result-panel">
      <div class="result-header">
        <h2>转写结果</h2>
        <button class="btn btn-primary btn-small" id="exportBtn" disabled>导出 TXT</button>
      </div>
      <div class="result-content" id="resultContent">
        <div class="empty-state">上传音频文件开始转写</div>
      </div>
    </div>
  </div>
  
  <script src="../agentic-client.js"></script>
  <script src="./transcription-studio.js"></script>
</body>
</html>
