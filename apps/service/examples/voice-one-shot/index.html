<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice One-Shot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .subtitle {
      color: #888;
      font-size: 16px;
      margin-bottom: 24px;
    }
    
    .badge {
      display: inline-block;
      background: #374151;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 48px;
    }
    
    .mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .mic-button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
    
    .mic-button.recording {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
    }
    
    .status {
      font-size: 18px;
      color: #888;
      margin-bottom: 24px;
      min-height: 28px;
    }
    
    .latency {
      font-size: 14px;
      color: #4ade80;
      margin-bottom: 24px;
    }
    
    .result {
      background: #1a1a1a;
      padding: 24px;
      border-radius: 8px;
      text-align: left;
      line-height: 1.8;
    }
    
    .result-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    
    .result-text {
      font-size: 16px;
      margin-bottom: 16px;
    }
    
    audio {
      width: 100%;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Voice One-Shot</h1>
    <p class="subtitle">一次调用完成 STT → LLM → TTS</p>
    <div class="badge">使用 /api/voice 接口</div>
    
    <button class="mic-button" id="micBtn">🎤</button>
    
    <div class="status" id="status">按住说话</div>
    <div class="latency" id="latency"></div>
    
    <div class="result">
      <div class="result-label">完整链路结果</div>
      <div class="result-text" id="result">等待输入...</div>
      <audio id="audio" controls style="display: none;"></audio>
    </div>
  </div>
  
  <script src="../agentic-client.js"></script>
  <script src="./voice-one-shot.js"></script>
</body>
</html>
