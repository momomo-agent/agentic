services:
  agentic-service:
    build: .
    ports:
      - "1234:1234"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:1234/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
